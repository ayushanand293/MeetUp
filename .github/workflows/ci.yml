name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-week4-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start services
        run: docker compose up -d --build db redis backend

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Run Week 4 validation tests
        run: docker compose exec -T backend python test_week4_features.py

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint web
        run: npm run lint
      - name: Build web
        run: npm run build
