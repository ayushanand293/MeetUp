name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-week4-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Run migrations
        run: docker compose exec -T backend alembic upgrade head

      - name: Run backend test suite
        run: docker compose exec -T backend pytest -q

      - name: Make smoke scripts executable
        run: |
          chmod +x scripts/beta_smoke.sh scripts/interviewer_quickcheck.sh

      - name: Run smoke flow
        run: ./scripts/beta_smoke.sh

      - name: Run dependency security scan
        run: |
          docker compose exec -T backend pip install pip-audit
          docker compose exec -T backend pip-audit --desc on

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint web
        run: npm run lint
      - name: Build web
        run: npm run build
