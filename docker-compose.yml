

services:
  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-meetup}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-meetup}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-meetup}
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - ANALYTICS_ENABLED=${ANALYTICS_ENABLED:-true}
      - PROJECT_NAME=${PROJECT_NAME:-MeetUp API}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-[]}
      - METRICS_BACKEND=${METRICS_BACKEND:-redis}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-}
      - AUTH_JWT_ALGORITHM=${AUTH_JWT_ALGORITHM:-HS256}
      - AUTH_ACCESS_TOKEN_TTL_SECONDS=${AUTH_ACCESS_TOKEN_TTL_SECONDS:-86400}
      - OTP_TTL_SECONDS=${OTP_TTL_SECONDS:-300}
      - OTP_DIGITS=${OTP_DIGITS:-6}
      - OTP_START_LIMIT_PER_PHONE=${OTP_START_LIMIT_PER_PHONE:-5}
      - OTP_START_LIMIT_PER_IP=${OTP_START_LIMIT_PER_IP:-20}
      - OTP_VERIFY_LIMIT_PER_PHONE=${OTP_VERIFY_LIMIT_PER_PHONE:-10}
      - OTP_VERIFY_LIMIT_PER_IP=${OTP_VERIFY_LIMIT_PER_IP:-30}
      - OTP_DEV_ECHO_ENABLED=${OTP_DEV_ECHO_ENABLED:-false}
      - PHONE_HASH_PEPPER=${PHONE_HASH_PEPPER:-dev-pepper-change-me}
      - CONTACTS_HASH_VERSION=${CONTACTS_HASH_VERSION:-1}
      - CONTACTS_MATCH_MAX_DIGESTS=${CONTACTS_MATCH_MAX_DIGESTS:-500}
      - CONTACTS_MATCH_LIMIT_PER_MINUTE=${CONTACTS_MATCH_LIMIT_PER_MINUTE:-30}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
